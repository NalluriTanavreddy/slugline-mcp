name: Publish to TestPyPI

# Manual only -- this is for pre-release validation before a real PyPI
# release, not something that should ever fire automatically on a commit.
# Trigger it from the Actions tab (or `gh workflow run publish-testpypi.yml`).
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish-testpypi:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Build distribution
        run: uv run python -m build

      - name: Publish to TestPyPI
        run: uv run twine upload --repository-url https://test.pypi.org/legacy/ dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.TEST_PYPI_API_TOKEN }}
